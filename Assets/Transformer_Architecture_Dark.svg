<svg id="transformer-svg" viewBox="0 0 900 1000" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <style>
                    .title {
                        fill: #e2e8f0;
                        font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                        font-size: 13px;
                        font-weight: 600;
                    }
                    .desc {
                        fill: #cbd5e1;
                        font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                        font-size: 11px;
                        font-weight: 500;
                    }
                    .detail {
                        fill: #94a3b8;
                        font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                        font-size: 12px;
                        font-weight: 500;
                    }
                    .nx-label {
                        fill: #94a3b8;
                        font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                        font-size: 18px;
                        font-weight: 700;
                    }
                    .small-label {
                        fill: #e2e8f0;
                        font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                        font-size: 12px;
                        font-weight: 700;
                    }
                </style>
                <!-- Gradienti -->
                <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#38bdf8"/>
                    <stop offset="100%" stop-color="#60a5fa"/>
                </linearGradient>
                <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#f97316"/>
                    <stop offset="100%" stop-color="#facc15"/>
                </linearGradient>
                <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#0b1224"/>
                    <stop offset="100%" stop-color="#101a36"/>
                </linearGradient>

                <!-- Ombre e Glow -->
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.5" flood-color="#000"/>
                </filter>
                <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="0" stdDeviation="6" flood-opacity="0.4" flood-color="#38bdf8"/>
                </filter>

                <!-- Markers / Frecce -->
                <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
                </marker>
                <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb923c"/>
                </marker>

                <!-- Pattern Griglia Sfondo -->
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <circle cx="2" cy="2" r="1.5" fill="#cbd5f5" opacity="0.03"/>
                </pattern>
            </defs>

            <!-- Sfondo -->
            <rect width="100%" height="100%" fill="url(#bg-grad)"/>
            <rect width="100%" height="100%" fill="url(#grid)"/>

            <!-- TITOLO -->
            <text x="450" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc" letter-spacing="1">ARCHITETTURA TRANSFORMER</text>
            <text x="450" y="60" text-anchor="middle" font-size="14" fill="#94a3b8">Attention Is All You Need</text>

            <!-- ========================================== -->
            <!-- PANNELLI BACKGROUND (Nx Blocks)            -->
            <!-- ========================================== -->
            <!-- Encoder Block -->
            <rect x="90" y="398" width="320" height="410" rx="16" fill="#1e293b" fill-opacity="0.3" stroke="#475569" stroke-dasharray="6 6"/>
            <text x="60" y="610" class="nx-label">Nx</text>
            <text x="110" y="785" class="detail" fill="#cbd5f5" opacity="0.7">Encoder</text>

            <!-- Decoder Block -->
            <rect x="490" y="218" width="340" height="590" rx="16" fill="#1e293b" fill-opacity="0.3" stroke="#475569" stroke-dasharray="6 6"/>
            <text x="850" y="520" class="nx-label">Nx</text>
            <text x="795" y="785" text-anchor="end" class="detail" fill="#cbd5f5" opacity="0.7">Decoder</text>

            <!-- ========================================== -->
            <!-- PERCORSI E FRECCE (Disegnati sotto i box)  -->
            <!-- ========================================== -->
            
            <!-- ====== ENCODER PATHS ====== -->
            <path d="M 250 930 L 250 902" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            <path d="M 250 858 L 250 826" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            
            <!-- Positional Encoding in Encoder -->
            <path d="M 130 810 L 234 810" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            <path d="M 250 794 L 250 750" stroke="#38bdf8" stroke-width="2.5"/>
            
            <!-- Split to 3 Arrows (Q, K, V) into MHA -->
            <path d="M 250 750 L 250 732" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            <path d="M 250 750 L 210 750 L 210 732" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            <path d="M 250 750 L 290 750 L 290 732" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>

            <path d="M 250 688 L 250 652" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            <path d="M 250 608 L 250 552" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            <path d="M 250 508 L 250 472" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            
            <!-- ====== DECODER PATHS ====== -->
            <path d="M 650 930 L 650 902" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            <path d="M 650 858 L 650 826" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            
            <!-- Positional Encoding in Decoder -->
            <path d="M 770 810 L 666 810" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            <path d="M 650 794 L 650 750" stroke="#38bdf8" stroke-width="2.5"/>
            
            <!-- Split to 3 Arrows into Masked MHA -->
            <path d="M 650 750 L 650 732" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            <path d="M 650 750 L 610 750 L 610 732" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            <path d="M 650 750 L 690 750 L 690 732" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>

            <path d="M 650 688 L 650 652" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            
            <!-- Q Arrow into Cross Attention -->
            <path d="M 650 608 L 650 580 L 690 580 L 690 552" fill="none" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            
            <path d="M 650 508 L 650 472" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            <path d="M 650 428 L 650 372" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            <path d="M 650 328 L 650 292" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            <path d="M 650 248 L 650 202" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            <path d="M 650 158 L 650 122" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            <path d="M 650 78 L 650 40" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>

            <!-- ========================================== -->
            <!-- CROSS ATTENTION ROUTING (Da Encoder a Decoder) -->
            <!-- ========================================== -->
            <!-- Linea principale dall'Encoder -->
            <path d="M 250 428 L 250 380 L 480 380 L 480 570" fill="none" stroke="#38bdf8" stroke-width="2.5"/>
            
            <!-- Diramazione V (Sinistra) -->
            <path d="M 480 570 L 610 570 L 610 552" fill="none" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            <circle cx="585" cy="570" r="12" fill="#0b1224" stroke="#38bdf8" stroke-width="1.5"/>
            <text x="585" y="574" text-anchor="middle" class="small-label">V</text>

            <!-- Diramazione K (Centro) -->
            <path d="M 480 570 L 650 570 L 650 552" fill="none" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
            <circle cx="625" cy="570" r="12" fill="#0b1224" stroke="#38bdf8" stroke-width="1.5"/>
            <text x="625" y="574" text-anchor="middle" class="small-label">K</text>

            <!-- ========================================== -->
            <!-- SKIP CONNECTIONS (Feed-Forward Arancioni)  -->
            <!-- ========================================== -->
            <!-- Encoder Skip 1 -->
            <path d="M 250 770 L 115 770 L 115 630 L 152 630" fill="none" stroke="#fb923c" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-orange)"/>
            <!-- Encoder Skip 2 -->
            <path d="M 250 580 L 115 580 L 115 450 L 152 450" fill="none" stroke="#fb923c" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-orange)"/>

            <!-- Decoder Skip 1 -->
            <path d="M 650 770 L 805 770 L 805 630 L 748 630" fill="none" stroke="#fb923c" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-orange)"/>
            <!-- Decoder Skip 2 -->
            <path d="M 650 580 L 805 580 L 805 450 L 748 450" fill="none" stroke="#fb923c" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-orange)"/>
            <!-- Decoder Skip 3 -->
            <path d="M 650 400 L 805 400 L 805 270 L 748 270" fill="none" stroke="#fb923c" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-orange)"/>


            <!-- ========================================== -->
            <!-- BOX CODIFICATORE (Sinistra X=250)          -->
            <!-- ========================================== -->
            
            <!-- Positional Encoding -->
            <rect x="25" y="790" width="105" height="40" rx="12" fill="#1e293b" stroke="url(#cyan-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="77" y="806" text-anchor="middle" class="title">Positional</text>
            <text x="77" y="820" text-anchor="middle" class="desc">Encoding</text>
            
            <!-- Add Node -->
            <circle cx="250" cy="810" r="16" fill="#1e293b" stroke="url(#cyan-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="250" y="816" text-anchor="middle" font-size="20" font-weight="bold" fill="#f8fafc">+</text>

            <!-- Input Embedding -->
            <rect x="160" y="858" width="180" height="44" rx="12" fill="#1e293b" stroke="url(#cyan-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="250" y="884" text-anchor="middle" class="title">Input Embedding</text>

            <!-- MHA -->
            <rect x="160" y="688" width="180" height="44" rx="12" fill="#1e293b" stroke="url(#cyan-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="250" y="714" text-anchor="middle" class="title">Multi-Head Attention</text>

            <!-- Add & Norm -->
            <rect x="160" y="608" width="180" height="44" rx="12" fill="#1f2937" stroke="url(#orange-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="250" y="634" text-anchor="middle" class="title">Add &amp; Norm</text>

            <!-- Feed Forward -->
            <rect x="160" y="508" width="180" height="44" rx="12" fill="#1e293b" stroke="url(#cyan-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="250" y="534" text-anchor="middle" class="title">Feed Forward</text>

            <!-- Add & Norm -->
            <rect x="160" y="428" width="180" height="44" rx="12" fill="#1f2937" stroke="url(#orange-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="250" y="454" text-anchor="middle" class="title">Add &amp; Norm</text>


            <!-- ========================================== -->
            <!-- BOX DECODIFICATORE (Destra X=650)          -->
            <!-- ========================================== -->

            <!-- Positional Encoding -->
            <rect x="770" y="790" width="105" height="40" rx="12" fill="#1e293b" stroke="url(#cyan-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="822" y="806" text-anchor="middle" class="title">Positional</text>
            <text x="822" y="820" text-anchor="middle" class="desc">Encoding</text>
            
            <!-- Add Node -->
            <circle cx="650" cy="810" r="16" fill="#1e293b" stroke="url(#cyan-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="650" y="816" text-anchor="middle" font-size="20" font-weight="bold" fill="#f8fafc">+</text>

            <!-- Output Embedding -->
            <rect x="560" y="858" width="180" height="44" rx="12" fill="#1e293b" stroke="url(#cyan-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="650" y="884" text-anchor="middle" class="title">Output Embedding</text>

            <!-- Masked MHA -->
            <rect x="560" y="688" width="180" height="44" rx="12" fill="#1e293b" stroke="url(#cyan-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="650" y="706" text-anchor="middle" class="title">Masked</text>
            <text x="650" y="720" text-anchor="middle" class="desc">Multi-Head Attention</text>

            <!-- Add & Norm -->
            <rect x="560" y="608" width="180" height="44" rx="12" fill="#1f2937" stroke="url(#orange-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="650" y="634" text-anchor="middle" class="title">Add &amp; Norm</text>

            <!-- Cross MHA -->
            <rect x="560" y="508" width="180" height="44" rx="12" fill="#1e293b" stroke="url(#cyan-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="650" y="534" text-anchor="middle" class="title">Multi-Head Attention</text>

            <!-- Add & Norm -->
            <rect x="560" y="428" width="180" height="44" rx="12" fill="#1f2937" stroke="url(#orange-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="650" y="454" text-anchor="middle" class="title">Add &amp; Norm</text>

            <!-- Feed Forward -->
            <rect x="560" y="328" width="180" height="44" rx="12" fill="#1e293b" stroke="url(#cyan-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="650" y="354" text-anchor="middle" class="title">Feed Forward</text>

            <!-- Add & Norm -->
            <rect x="560" y="248" width="180" height="44" rx="12" fill="#1f2937" stroke="url(#orange-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="650" y="274" text-anchor="middle" class="title">Add &amp; Norm</text>

            <!-- Linear -->
            <rect x="560" y="158" width="180" height="44" rx="12" fill="#1e293b" stroke="url(#cyan-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="650" y="184" text-anchor="middle" class="title">Linear</text>

            <!-- Softmax -->
            <rect x="560" y="78" width="180" height="44" rx="12" fill="#1f2937" stroke="url(#orange-grad)" stroke-width="2" filter="url(#shadow)"/>
            <text x="650" y="104" text-anchor="middle" class="title">Softmax</text>


            <!-- ========================================== -->
            <!-- TESTI INPUT / OUTPUT                       -->
            <!-- ========================================== -->
            
            <rect x="200" y="930" width="100" height="30" rx="6" fill="#0b1224" stroke="#38bdf8" stroke-dasharray="2 2"/>
            <text x="250" y="950" text-anchor="middle" class="title" fill="#38bdf8">Inputs</text>

            <rect x="560" y="930" width="180" height="40" rx="6" fill="#0b1224" stroke="#38bdf8" stroke-dasharray="2 2"/>
            <text x="650" y="946" text-anchor="middle" class="title" fill="#38bdf8">Outputs</text>
            <text x="650" y="962" text-anchor="middle" class="desc">(shifted right)</text>

            <rect x="560" y="10" width="180" height="30" rx="6" fill="#0b1224" stroke="#f97316" stroke-dasharray="2 2"/>
            <text x="650" y="30" text-anchor="middle" class="title" fill="#f97316">Output Probabilities</text>

        </svg>
