  <text x="90" y="44" class="title">Transformers asymptotically outperform LSTMs</text>
  <text x="90" y="76" class="title">due to improved use of long contexts</text>
  <text x="790" y="44" class="title">LSTM plateaus after &lt;100 tokens</text>
  <text x="790" y="76" class="title">Transformer improves through the whole context</text>

