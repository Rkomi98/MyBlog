<svg width="1400" height="620" viewBox="0 0 1400 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="620" fill="#F8F7F4"/>

  <style>
    .title { font: 700 24px 'Arial', sans-serif; fill: #111111; }
    .subtitle { font: 700 22px 'Arial', sans-serif; fill: #111111; }
    .label { font: 700 18px 'Arial', sans-serif; fill: #555555; }
    .tick { font: 400 15px 'Arial', sans-serif; fill: #555555; }
    .anno { font: 700 20px 'Arial', sans-serif; fill: #111111; }
