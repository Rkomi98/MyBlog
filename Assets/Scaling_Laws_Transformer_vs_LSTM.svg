  <text x="356" y="535" class="tick">10<tspan dy="-8" font-size="11">7</tspan></text>
  <text x="467" y="535" class="tick">10<tspan dy="-8" font-size="11">8</tspan></text>
  <text x="579" y="535" class="tick">10<tspan dy="-8" font-size="11">9</tspan></text>

