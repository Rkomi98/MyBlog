  <text x="92" y="45" class="title">Transformers asymptotically outperform LSTMs</text>
  <text x="92" y="76" class="title">due to improved use of long contexts</text>

  <text x="785" y="45" class="title">LSTM plateaus after &lt;100 tokens</text>
  <text x="785" y="76" class="title">Transformer improves through the whole context</text>

